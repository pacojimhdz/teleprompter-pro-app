<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teleprompter Pro v10</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="telemetry-bar">
        <div class="status-group">
            <!-- Canal de alertas dedicado para evitar solapamientos -->
            <div id="alertPill" class="status-pill alert-pill" style="display: none;"></div>
            
            <div id="vuPill" class="status-pill">
                <span id="vuDot" class="dot gray"></span> VU: 0%
            </div>
            <div id="storagePill" class="status-pill">
                <span class="dot gray"></span> Almacenamiento: Calculando...
            </div>
        </div>
        <div class="badge-group">
            <span id="resBadge" class="badge">--</span>
            <span id="fpsBadge" class="badge">--</span>
            <span id="battBadge" class="badge">--</span>
        </div>
    </header>

    <main class="studio-container">
        <section class="video-preview">
            <video id="video" autoplay playsinline muted></video>
            <div id="prompterOverlay" class="prompter-overlay">
                <div id="prompterScroll" class="prompter-scroll"></div>
            </div>
        </section>

        <section class="control-panel">
            <div class="control-group">
                <label for="videoSource">Cámara:</label>
                <select id="videoSource"></select>
            </div>
            <div class="control-group">
                <label for="audioSource">Micrófono:</label>
                <select id="audioSource"></select>
            </div>
            
            <div class="actions-group">
                <button id="btnStart" class="btn btn-primary"><span class="btn-dot"></span> GRABAR</button>
                <button id="btnPause" class="btn btn-secondary" disabled>⏸ PAUSA</button>
                <button id="btnStop" class="btn btn-danger" disabled>⏹ PARAR</button>
                <button id="btnReset" class="btn btn-warning">🔄 RESET</button>
            </div>

            <div class="config-group">
                <label>Texto del Guion:</label>
                <textarea id="scriptInput" placeholder="Escribe tu guion aquí..."></textarea>
            </div>

            <div class="sliders-group">
                <div class="slider-item">
                    <label for="fontSize">Tamaño de letra: <span id="fontSizeVal">1.5rem</span></label>
                    <input type="range" id="fontSize" min="1" max="4" step="0.1" value="1.5">
                </div>
                <div class="slider-item">
                    <label for="scrollSpeed">Velocidad: <span id="telSpeed">100 PPM</span></label>
                    <input type="range" id="scrollSpeed" min="50" max="300" step="10" value="100">
                </div>
                <div class="slider-item">
                    <label for="bgOpacity">Opacidad Fondo: <span id="bgOpacityVal">50%</span></label>
                    <input type="range" id="bgOpacity" min="0" max="100" value="50">
                </div>
            </div>

            <table class="data-table">
                <tr><td>Resolución activa:</td><td id="telResolution">--</td></tr>
                <tr><td>FPS reales:</td><td id="telFps">--</td></tr>
                <tr><td>Formato:</td><td id="telFormat">WebM (Opus/VP9)</td></tr>
                <tr><td>Duración clip:</td><td id="telDuration">00:00 min</td></tr>
            </table>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
